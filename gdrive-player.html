<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Trình phát Google Drive</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .controls-container {
      position: fixed;
      top: 16px;
      left: 16px;
      right: 16px;
      z-index: 999999;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 800;
      color: #fff;
      border: none;
      border-radius: 99px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.45);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background-color 0.2s, transform 0.1s;
      outline: none;
      text-decoration: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .btn-back {
      background-color: #2A4B2A; /* Brand green */
    }
    .btn-back:active {
      background-color: #1E351E;
      transform: scale(0.96);
    }

    .btn-open {
      background-color: #2563eb; /* Blue */
    }
    .btn-open:active {
      background-color: #1d4ed8;
      transform: scale(0.96);
    }

    .btn-download {
      background-color: #e11d48; /* Rose */
    }
    .btn-download:active {
      background-color: #be123c;
      transform: scale(0.96);
    }
  </style>
</head>
<body>

  <!-- Floating Controls Container -->
  <div class="controls-container">
    <button class="btn btn-back" onclick="goBack()">
      ← Quay lại bài học
    </button>
    <a id="openDriveBtn" class="btn btn-open" target="_blank">
      Phát video bị lỗi ──► Mở xem TT qua GDrive
    </a>
  </div>

  <!-- Google Drive Preview Iframe -->
  <iframe id="playerIframe" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const fileId = urlParams.get('id') || '';
    const iframe = document.getElementById('playerIframe');

    if (fileId) {
      iframe.src = `https://drive.google.com/file/d/${fileId}/preview`;
      document.getElementById('openDriveBtn').href = `https://drive.google.com/file/d/${fileId}/view?usp=drivesdk`;
    } else {
      alert('Không tìm thấy ID video Google Drive!');
    }

    function goBack() {
      const returnUrl = urlParams.get('returnUrl') || sessionStorage.getItem('courseReturnUrl');
      
      if (returnUrl) {
        window.location.href = returnUrl;
      } else if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = '/lms.html';
      }
    }
  </script>
</body>
</html>
