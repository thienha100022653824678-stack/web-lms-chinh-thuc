<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Trình phát Google Drive</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .back-btn {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 999999;
      padding: 12px 20px;
      font-size: 16px;
      font-weight: bold;
      color: #fff;
      background-color: #2A4B2A; /* Brand green */
      border: none;
      border-radius: 999px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.2s, transform 0.1s;
      outline: none;
      user-select: none;
      -webkit-user-select: none;
      text-decoration: none;
    }

    .back-btn:active {
      transform: scale(0.95);
      background-color: #1E351E;
    }
  </style>
</head>
<body>

  <!-- Floating Back Button -->
  <button class="back-btn" onclick="goBack()">
    ← Quay lại bài học
  </button>

  <!-- Google Drive Preview Iframe -->
  <iframe id="playerIframe" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const fileId = urlParams.get('id') || '';
    const iframe = document.getElementById('playerIframe');

    if (fileId) {
      iframe.src = `https://drive.google.com/file/d/${fileId}/preview`;
    } else {
      alert('Không tìm thấy ID video Google Drive!');
    }

    function goBack() {
      const returnUrl = urlParams.get('returnUrl') || sessionStorage.getItem('courseReturnUrl');
      
      if (returnUrl) {
        window.location.href = returnUrl;
      } else if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = '/lms.html';
      }
    }
  </script>
</body>
</html>
